name: Lua validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lua-validation:
    name: Lua 5.1 syntax and Luacheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks

      - name: Check Lua 5.1 syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            luac5.1 -p "$file"
          done < <(find . -type f -name '*.lua' -print0)

      - name: Validate TOC manifests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifests = sorted(Path(".").glob("*.toc"))
          if not manifests:
              raise SystemExit("No TOC manifests found")

          for manifest in manifests:
              missing = []
              for raw_line in manifest.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  path = Path(line.replace("\\", "/"))
                  if not path.is_file():
                      missing.append(line)
              if missing:
                  raise SystemExit(f"{manifest}: missing referenced files: {', '.join(missing)}")
              print(f"{manifest}: all referenced files exist")
          PY

      - name: Smoke-test addon startup
        shell: bash
        run: |
          mapfile -t addon_files < <(sed -n '/^[^#].*\.lua$/ { s#\\#/#g; p; }' QuestMasterPro.toc)
          lua5.1 tests/smoke.lua "${addon_files[@]}"

      - name: Install Luacheck
        run: |
          luarocks --lua-version=5.1 install luacheck 1.2.0 --local
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

      - name: Run Luacheck
        run: luacheck . --config .luacheckrc
