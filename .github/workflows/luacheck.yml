name: Lua validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lua-validation:
    name: Lua 5.1 syntax and Luacheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks

      - name: Check Lua 5.1 syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            luac5.1 -p "$file"
          done < <(find . -type f -name '*.lua' -print0)

      - name: Install Luacheck
        run: |
          luarocks --lua-version=5.1 install luacheck 1.2.0 --local
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

      - name: Run Luacheck
        run: luacheck . --config .luacheckrc
